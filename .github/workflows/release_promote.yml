name: Promote a Release
run-name: Promote ${{ inputs.version }} to ${{ inputs.channel }}
on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to promote (e.g. v1.0.0)"
        required: true
        type: string
      channel:
        description: "The channel to promote the version to"
        required: true
        type: choice
        options:
          - latest
          - pre-release
        default: latest
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      channel:
        required: true
        type: string
    secrets:
      QLTY_RELEASE_AWS_ROLE_ARN:
        required: true
permissions:
  contents: read
jobs:
  test:
    name: ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            command: curl https://qlty.sh | sh
          - runner: macos-15
            command: curl https://qlty.sh | sh
          - runner: windows-latest
            command: powershell -c "iwr -UseBasicParsing https://qlty.sh | iex"
    steps:
      - name: Install qlty and validate
        env:
          QLTY_VERSION: ${{ inputs.version }}
        run: ${{ matrix.command }} && ~/.qlty/bin/qlty version --no-upgrade-check
        shell: sh
  promote:
    permissions:
      contents: read
      id-token: write
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838
        with:
          role-to-assume: ${{ secrets.QLTY_RELEASE_AWS_ROLE_ARN }}
          role-session-name: ${{ vars.QLTY_RELEASE_AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ vars.QLTY_RELEASE_AWS_REGION }}
      - name: Upload to S3
        run: |
          VERSION="${INPUTS_VERSION}"
          CHANNEL="${INPUTS_CHANNEL}"
          if [ "$CHANNEL" != "latest" ] && [ "$CHANNEL" != "pre-release" ]; then
            echo "Unknown channel: $CHANNEL" >&2
            exit 1
          fi
          aws s3 cp --recursive "${VARS_QLTY_RELEASE_AWS_S3_DESTINATION}/v${VERSION#v}/" "${VARS_QLTY_RELEASE_AWS_S3_DESTINATION}/${CHANNEL}/"
        env:
          INPUTS_VERSION: ${{ inputs.version }}
          INPUTS_CHANNEL: ${{ inputs.channel }}
          VARS_QLTY_RELEASE_AWS_S3_DESTINATION: ${{ vars.QLTY_RELEASE_AWS_S3_DESTINATION }}
