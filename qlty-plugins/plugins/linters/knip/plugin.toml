config_version = "0"

[plugins.definitions.knip]
runtime = "node"
package = "knip"
file_types = ["javascript", "typescript", "jsx", "tsx"]
config_files = [
  "knip.json",
  "knip.jsonc",
  ".knip.json",
  ".knip.jsonc",
  "knip.ts",
  "knip.js",
  "knip.config.js",
  "knip.config.js",
]
affects_cache = ["package.json"]
latest_version = "6.27.0"
known_good_version = "5.88.1"
# No typescript extra_packages pin: knip >=5.62 bounds its typescript peer to <7,
# so npm resolves a compatible version on its own. Do not re-add a pin — a second
# `npm install` wipes native optional bindings (npm/cli#4828), which breaks knip 6.x.
# Anyone pinning knip <5.62 must pin typescript <7 themselves.
# knip 6.x is blocked on the managed node runtime: its engines (^20.19 || >=22.12)
# exclude node 21.7.3. Bump known_good to 6.x once the runtime moves off 21.
version_command = "knip --version"
description = "Find unused files, dependencies, and exports in JavaScript and TypeScript projects"

[[plugins.definitions.knip.drivers.lint.version]]
version_matcher = ">=5.62.0"
script = "knip --no-progress --reporter json ${config_script}"
config_script = "--config ${config_file}"
target = { type = "parent_with", path = "package.json" }
runs_from = { type = "target_directory" }
success_codes = [0, 1]
output = "stdout"
output_format = "knip"
skip_upstream = true
output_missing = "parse"
suggested = "config"

[[plugins.definitions.knip.drivers.lint.version]]
version_matcher = "<5.62.0"
script = "knip --no-progress --reporter json"
target = { type = "parent_with", path = "package.json" }
runs_from = { type = "target_directory" }
success_codes = [0, 1]
output = "stdout"
output_format = "knip"
skip_upstream = true
output_missing = "parse"
suggested = "config"
known_good_version = "5.88.1"
