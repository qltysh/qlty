config_version = "0"

[plugins.definitions.oxc]
runtime = "node"
package = "oxlint"
file_types = ["javascript", "typescript", "jsx", "tsx"]
affects_cache = ["package.json", "tsconfig.json"]
latest_version = "1.74.0"
# oxlint >=1.0 requires node ^20.19 || >=22.12; the managed node runtime (21.7.3)
# fails that engine check, so npm skips the native binding and installs break.
# Bump known_good once the node runtime moves off 21.x. The >=1.0.0 driver block
# below is ready for that (oxlint 1.x changed the --format github title syntax).
known_good_version = "0.11.1"
version_command = "oxlint --version"
description = "Javascript linter"

[[plugins.definitions.oxc.drivers.lint.version]]
version_matcher = "<1.0.0"
script = "oxlint --format github ${target}"
success_codes = [0, 1]
error_codes = [2]
config_files = ["oxlintrc.json"]
output = "stdout"
output_format = "regex"
output_regex = "::(?P<severity>[^ ]+) file=(?P<path>[^,]+),line=(?P<line>\\d+),endLine=(?P<end_line>\\d+),col=(?P<col>\\d+),endColumn=(?P<end_col>\\d+),title=oxlint::(?P<code>[^ ]+) (?P<message>.+)"
batch = true
cache_results = true
max_batch = 40
output_missing = "parse"
suggested = "config"

[[plugins.definitions.oxc.drivers.lint.version]]
version_matcher = ">=1.0.0"
script = "oxlint --format github ${target}"
success_codes = [0, 1]
error_codes = [2]
config_files = ["oxlintrc.json"]
output = "stdout"
output_format = "regex"
output_regex = "::(?P<severity>[^ ]+) file=(?P<path>[^,]+),line=(?P<line>\\d+),endLine=(?P<end_line>\\d+),col=(?P<col>\\d+),endColumn=(?P<end_col>\\d+),title=(?P<code>[^:]+)::(?P<message>.+)"
batch = true
cache_results = true
max_batch = 40
output_missing = "parse"
suggested = "config"